<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heavstal Stream Tester</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="search-section" class="container">
        <h1>Heavstal Movie Streamer</h1>
        <p>Enter a Movie ID to fetch details and stream instantly.</p>
        <form id="search-form">
            <input type="number" id="movie-id" placeholder="e.g. 11" required min="1">
            <button type="submit">Search & Stream</button>
        </form>
        <div id="loading" class="hidden">Fetching movie data...</div>
        <div id="error-message" class="error hidden"></div>
    </div>
    <div id="movie-section" class="container hidden">
        <button id="back-btn">← Back to Search</button>
        
        <div class="movie-header">
            <img id="movie-poster" src="" alt="Movie Poster">
            <div class="movie-info">
                <h2 id="movie-title">Title</h2>
                <div class="metadata">
                    <span id="movie-year"></span> • 
                    <span id="movie-rating"></span>⭐ • 
                    <span id="movie-runtime"></span> mins
                </div>
                <div id="movie-genres" class="genres"></div>
                <p id="movie-description" class="description"></p>
                
                <div class="cast-section">
                    <h3>Cast</h3>
                    <div id="movie-cast" class="cast-list"></div>
                </div>
            </div>
        </div>

        <div class="player-container">
            <h3>WebTorrent Stream</h3>
            <div id="stream-status">Waiting for peers...</div>
            <div class="progress-bar-container hidden" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <p id="download-speed" class="speed-text"></p>
            <video id="video-player" controls></video>
        </div>
    </div>
    <script type="module" src="./app.js"></script>
</body>
</html>
